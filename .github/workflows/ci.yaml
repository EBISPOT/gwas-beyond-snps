name: CI


on:
  push:
    branches:
      - "**"
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "noxfile.py"
  pull_request:
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - "noxfile.py"
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install nox
        run: uv venv && uv pip install nox

      - name: Run Nox (fail fast)
        run: uv tool run nox
